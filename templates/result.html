<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - AI Image Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="glass-card">
            <h1>Analysis Results</h1>
            <p class="subtitle">AI-powered object detection complete.</p>

            <div class="results-grid">
                <div class="result-image-wrapper">
                    <h3 style="margin-bottom: 1.5rem; color: var(--text-main);">Processed Image</h3>
                    <div class="result-image-container">
                        <img src="{{ url_for('static', filename='results/' + result_image) }}" alt="Result"
                            class="result-image">
                    </div>
                </div>

                <div class="detections-pane">
                    <div class="detection-header">Detected Objects</div>
                    <div class="detections-list">
                        {% if detections %}
                        {% for item in detections %}
                        <div class="detection-item">
                            <span class="label">{{ item.label }}</span>
                            <span class="confidence-badge">{{ item.confidence }}</span>
                        </div>
                        {% endfor %}
                        {% else %}
                        <p style="color: var(--text-muted);">No objects detected in this image.</p>
                        {% endif %}
                    </div>
                    <a href="/" class="btn"
                        style="display: inline-block; text-decoration: none; margin-top: 2rem; width: 80%;">Try
                        Another</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
